  /appointments:
    post:
      tags: [Appointments]
      summary: Agendar cita por recepcionista
      description: Requiere JWT con rol RECEPCIONISTA. La cita queda confirmada solo si el pago mock aprobado se registra en la misma transaccion.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Cita confirmada con pago aprobado registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedAppointmentResponse'
        '400':
          description: Solicitud invalida, pago faltante/invalido, veterinario invalido o servicio inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol no autorizado o mascota no pertenece al cliente indicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Veterinario ocupado en la fecha y hora solicitadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /appointments/client:
    post:
      tags: [Appointments]
      summary: Agendar cita para la mascota del cliente autenticado
      description: Requiere JWT con rol CLIENTE. El cliente no envia clienteCodigo; se deriva desde el token y la mascota debe pertenecerle.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientAppointmentRequest'
      responses:
        '201':
          description: Cita confirmada con pago aprobado registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedAppointmentResponse'
        '400':
          description: Solicitud invalida, pago faltante/invalido, veterinario invalido o servicio inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol no autorizado, cliente sin cuenta asociada o mascota ajena
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Veterinario ocupado en la fecha y hora solicitadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /appointments/daily-agenda:
    get:
      tags: [Appointments]
      summary: Consultar agenda diaria
      description: Requiere JWT con rol RECEPCIONISTA o VETERINARIO. El veterinario solo puede consultar su propia agenda.
      security:
        - bearerAuth: []
      parameters:
        - name: veterinarioCodigo
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: fecha
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Agenda diaria del veterinario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyAgendaAppointmentResponse'
        '400':
          description: veterinarioCodigo y fecha son obligatorios o invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol no autorizado o veterinario consultando agenda ajena
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /appointments/{codigo}/complete:
    patch:
      tags: [Appointments]
      summary: Finalizar cita
      description: Requiere JWT con rol VETERINARIO. Solo el veterinario asignado puede finalizar citas confirmadas y con pago registrado.
      security:
        - bearerAuth: []
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cita finalizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentStateResponse'
        '400':
          description: Codigo invalido o faltante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token ausente o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol no autorizado o veterinario no asignado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cita no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cita cancelada, ya finalizada, no confirmada o sin pago registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /appointments/{codigo}/cancel:
    patch:
      tags: [Appointments]
      summary: Cancelar cita
      description: Requiere JWT con rol CLIENTE, RECEPCIONISTA o VETERINARIO. Cliente solo cancela citas propias y veterinario solo citas asignadas.
      security:
        - bearerAuth: []
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
