openapi: 3.0.3
info:
  title: B&H Veterinary System — bh-core
  description: |
    Sistema principal de B&H
    Gestiona toda la operación de la clinica: usuarios, clientes, mascotas, citas, historiales médicos, inventario y facturacion.
  version: 1.0.0
  contact:
    name: Equipo B&H
servers:
  - url: /api/v1
    description: API v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- Auth ---
    RegisterRequest:
      type: object
      required: [nombre, apellido, correo, contrasena, telefono, rol]
      properties:
        nombre:
          type: string
          minLength: 3
          maxLength: 50
          example: Isabela
        apellido:
          type: string
          minLength: 3
          maxLength: 50
          example: Quintero
        correo:
          type: string
          format: email
          maxLength: 70
          example: isabela@gmail.com
        contrasena:
          type: string
          minLength: 8
          maxLength: 50
          example: Segura123
        telefono:
          type: string
          minLength: 10
          maxLength: 10
          example: "3001234567"
        rol:
          type: string
          enum: [CLIENTE, RECEPCIONISTA, VETERINARIO]
    VerifyEmailRequest:
      type: object
      required: [correo, codigo]
      properties:
        correo:
          type: string
          format: email
          example: isabela@gmail.com
        codigo:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
    LoginRequest:
      type: object
      required: [correo, contrasena]
      properties:
        correo:
          type: string
          format: email
          example: isabela@gmail.com
        contrasena:
          type: string
          example: Segura123
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        codigo:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        correo:
          type: string
          format: email
        rol:
          type: string
          enum: [ADMIN, CLIENTE, RECEPCIONISTA, VETERINARIO]

    # --- Users ---
    UserResponse:
      type: object
      properties:
        codigo:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        correo:
          type: string
          format: email
        telefono:
          type: string
        rol:
          type: string
          enum: [ADMIN, CLIENTE, RECEPCIONISTA, VETERINARIO]
        estado:
          type: string
          enum: [pendiente_verificacion, pendiente_aprobacion, activo, suspendido, rechazado]
        creadoEn:
          type: string
    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    # --- Clientes ---
    CreateClientRequest:
      type: object
      required: [userId, address, city]
      properties:
        userId:
          type: string
          format: uuid
        address:
          type: string
        city:
          type: string
    UpdateClientRequest:
      type: object
      properties:
        address:
          type: string
        city:
          type: string
    ClientResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        address:
          type: string
        city:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserResponse'

    # --- mascotas ---
    CreatePetRequest:
      type: object
      required: [name, species, breed, color, birthDate, weight]
      properties:
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        color:
          type: string
        birthDate:
          type: string
          format: date
        weight:
          type: number
    UpdatePetRequest:
      type: object
      properties:
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        color:
          type: string
        birthDate:
          type: string
          format: date
        weight:
          type: number
    UpdatePetStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [activa, hospitalizada, fallecida]
    PetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        color:
          type: string
        birthDate:
          type: string
          format: date
        weight:
          type: number
        status:
          type: string
          enum: [activa, hospitalizada, fallecida]
        createdAt:
          type: string
          format: date-time

    # --- Servicios ---
    CreateServiceRequest:
      type: object
      required: [name, description, price]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
    ServiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Citas ---
    CreateAppointmentRequest:
      type: object
      required: [usuarioCodigo, mascotaCodigo, clienteCodigo, fecha, hora, serviciosCodigos, metodoPago]
      properties:
        usuarioCodigo:
          type: string
          format: uuid
          description: Codigo del veterinario asignado. Solo recepcionista puede enviarlo en POST /appointments.
        mascotaCodigo:
          type: string
          format: uuid
        clienteCodigo:
          type: string
          format: uuid
        fecha:
          type: string
          format: date
          example: '2024-06-10'
        hora:
          type: string
          example: '09:00'
        serviciosCodigos:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        metodoPago:
          type: string
          enum: [efectivo, tarjeta, transferencia, otro]
    CreateClientAppointmentRequest:
      type: object
      required: [usuarioCodigo, mascotaCodigo, fecha, hora, serviciosCodigos, metodoPago]
      properties:
        usuarioCodigo:
          type: string
          format: uuid
          description: Codigo del veterinario solicitado.
        mascotaCodigo:
          type: string
          format: uuid
        fecha:
          type: string
          format: date
          example: '2024-06-10'
        hora:
          type: string
          example: '09:00'
        serviciosCodigos:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        metodoPago:
          type: string
          enum: [efectivo, tarjeta, transferencia, otro]
    AppointmentServiceItem:
      type: object
      properties:
        codigo:
          type: string
          format: uuid
        nombre:
          type: string
        precioUnitario:
          type: number
    AppointmentPaymentResponse:
      type: object
      properties:
        codigo:
          type: string
          format: uuid
        monto:
          type: number
        metodoPago:
          type: string
          enum: [efectivo, tarjeta, transferencia, otro]
        estado:
          type: string
          enum: [aprobado]
          description: Pago mock aprobado registrado al crear la cita.
        fecha:
          type: string
          format: date
    CreatedAppointmentResponse:
      type: object
      properties:
        codigo:
          type: string
          format: uuid
        total:
          type: number
        estado:
          type: string
          enum: [confirmada]
        servicios:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentServiceItem'
        pago:
          $ref: '#/components/schemas/AppointmentPaymentResponse'
    DailyAgendaAppointmentResponse:
      type: object
      properties:
        cita:
          type: object
          properties:
            codigo:
              type: string
              format: uuid
            fecha:
              type: string
              format: date
            hora:
              type: string
              example: '09:00:00'
        estado:
          type: string
          enum: [pendiente, confirmada, completada, cancelada]
        total:
          type: number
        mascota:
          type: object
          properties:
            codigo:
              type: string
              format: uuid
            nombre:
              type: string
            especie:
              type: string
            raza:
              type: string
        cliente:
          type: object
          properties:
            codigo:
              type: string
              format: uuid
            usuarioCodigo:
              type: string
              format: uuid
            nombre:
              type: string
            apellido:
              type: string
            correo:
              type: string
              format: email
            ciudad:
              type: string
        servicios:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentServiceItem'
    AppointmentStateResponse:
      type: object
      properties:
        codigo:
          type: string
          format: uuid
        usuarioCodigo:
          type: string
          format: uuid
        mascotaCodigo:
          type: string
          format: uuid
        clienteCodigo:
          type: string
          format: uuid
        fecha:
          type: string
          format: date
        hora:
          type: string
          example: '09:00:00'
        estado:
          type: string
          enum: [pendiente, confirmada, completada, cancelada]
        total:
          type: number
        motivoCancelacion:
          type: string
          nullable: true
    AppointmentResponse:
      $ref: '#/components/schemas/AppointmentStateResponse'
    CancelAppointmentRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string
          minLength: 1

    # --- Historiales Clinicos ---
    CreateMedicalRecordRequest:
      type: object
      required: [visitReason, diagnosis, treatment, petWeight]
      properties:
        visitReason:
          type: string
        diagnosis:
          type: string
        treatment:
          type: string
        petWeight:
          type: number
        nextVisitDate:
          type: string
          format: date
        prescriptions:
          type: array
          items:
            $ref: '#/components/schemas/PrescriptionInput'
    UpdateMedicalRecordRequest:
      type: object
      properties:
        visitReason:
          type: string
        diagnosis:
          type: string
        treatment:
          type: string
        petWeight:
          type: number
        nextVisitDate:
          type: string
          format: date
        prescriptions:
          type: array
          items:
            $ref: '#/components/schemas/PrescriptionInput'
    PrescriptionInput:
      type: object
      required: [medicationName, dosage, duration]
      properties:
        medicationName:
          type: string
        dosage:
          type: string
        duration:
          type: string
        inventoryProductId:
          type: string
          format: uuid
          nullable: true
    MedicalRecordResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appointmentId:
          type: string
          format: uuid
        petId:
          type: string
          format: uuid
        veterinarianId:
          type: string
          format: uuid
        visitReason:
          type: string
        diagnosis:
          type: string
        treatment:
          type: string
        petWeight:
          type: number
        nextVisitDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        editableUntil:
          type: string
          format: date-time
        prescriptions:
          type: array
          items:
            $ref: '#/components/schemas/PrescriptionInput'

    # --- Vacunas ---
    CreateVaccinationRequest:
      type: object
      required: [vaccineName, applicationDate]
      properties:
        vaccineName:
          type: string
        applicationDate:
          type: string
          format: date
        nextDoseDate:
          type: string
          format: date
    VaccinationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        medicalRecordId:
          type: string
          format: uuid
        petId:
          type: string
          format: uuid
        vaccineName:
          type: string
        applicationDate:
          type: string
          format: date
        nextDoseDate:
          type: string
          format: date

    # --- Hospitalizaciones ---
    CreateHospitalizationRequest:
      type: object
      required: [admissionDate, reason]
      properties:
        admissionDate:
          type: string
          format: date-time
        reason:
          type: string
          description: Motivo o contexto del ingreso de la mascota
    DischargeHospitalizationRequest:
      type: object
      required: [dischargeStatus]
      properties:
        dischargeStatus:
          type: string
          enum: [recuperada, fallecida, trasladada]
    CreateEvolutionNoteRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
    EvolutionNoteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hospitalizationId:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        note:
          type: string
        veterinarianId:
          type: string
          format: uuid
    HospitalizationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        petId:
          type: string
          format: uuid
        veterinarianId:
          type: string
          format: uuid
        admissionDate:
          type: string
          format: date-time
        dischargeDate:
          type: string
          format: date-time
        dischargeStatus:
          type: string
          enum: [recuperada, fallecida, trasladada]
        isActive:
          type: boolean
        evolutionNotes:
          type: array
          items:
            $ref: '#/components/schemas/EvolutionNoteResponse'

    # --- Inventario ---
    CreateInventoryProductRequest:
      type: object
      required: [name, category, stock, minStock, price]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [medicamento, vacuna, insumo_quirurgico]
        stock:
          type: integer
        minStock:
          type: integer
        price:
          type: number
        expirationDate:
          type: string
          format: date
    UpdateInventoryProductRequest:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        minStock:
          type: integer
        expirationDate:
          type: string
          format: date
    AdjustStockRequest:
      type: object
      required: [quantity, reason]
      properties:
        quantity:
          type: integer
          description: Cantidad a sumar o restar del stock actual
        reason:
          type: string
    InventoryProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [medicamento, vacuna, insumo_quirurgico]
        type:
          type: string
          description: Alias semántico de `category` para el contrato SCRUM-98
          enum: [medicamento, vacuna, insumo_quirurgico]
        stock:
          type: integer
        minStock:
          type: integer
        price:
          type: number
        expirationDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
    InventoryProductWithAlerts:
      allOf:
        - $ref: '#/components/schemas/InventoryProductResponse'
        - type: object
          properties:
            isLowStock:
              type: boolean
              description: True cuando `stock <= minStock`
            isExpiringSoon:
              type: boolean
              description: True cuando `expirationDate` está en los próximos 30 días
    InventoryAlertsResponse:
      type: object
      properties:
        lowStock:
          type: array
          items:
            $ref: '#/components/schemas/InventoryProductWithAlerts'
        expiringSoon:
          type: array
          items:
            $ref: '#/components/schemas/InventoryProductWithAlerts'
    UpdateServicePriceRequest:
      type: object
      required: [price]
      properties:
        price:
          type: number
          minimum: 0

    # --- Invoices ---
    CreateInvoiceRequest:
      type: object
      properties:
        discount:
          type: number
          default: 0
    VoidInvoiceRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
    InvoiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appointmentId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        subtotal:
          type: number
        discount:
          type: number
        prepaidAmount:
          type: number
        totalDue:
          type: number
        status:
          type: string
          enum: [pendiente, pagada, anulada]
        voidReason:
          type: string
        createdAt:
          type: string
          format: date-time
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceResponse'
        additionalMedications:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              price:
                type: number
              quantity:
                type: integer

    # --- Paginación y Errores ---
    PaginatedUsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedClientsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ClientResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedServicesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ServiceResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedAppointmentsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedMedicalRecordsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MedicalRecordResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedVaccinationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VaccinationResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedHospitalizationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/HospitalizationResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedInventoryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InventoryProductResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedInvoicesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [statusCode, error, message, timestamp, path]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

security:
  - bearerAuth: []

tags:
  - name: System
    description: Endpoints de sistema
  - name: Auth
    description: Autenticación y registro
  - name: Users
    description: Gestión de usuarios del sistema
  - name: Clients
    description: Gestión de clientes (dueños de mascotas)
  - name: Pets
    description: Gestión de mascotas
  - name: Services
    description: Catálogo de servicios
  - name: Appointments
    description: Agenda de citas
  - name: Medical Records
    description: Historial médico
  - name: Vaccinations
    description: Registro de vacunas
  - name: Hospitalizations
    description: Gestión de internamiento
  - name: Inventory
    description: Control de inventario
  - name: Invoices
    description: Facturación
  - name: Reports
    description: Generación de reportes

paths:
  /health:
    get:
      tags: [System]
      summary: Health check para Kubernetes
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado, pendiente verificación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verificar correo
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Correo verificado
        '400':
          description: Código inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales incorrectas o cuenta inactiva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refrescar token
      responses:
        '200':
          description: Nuevo token generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Token inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      tags: [Auth]
      summary: Perfil propio
      responses:
        '200':
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      tags: [Auth]
      summary: Actualizar perfil propio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
  /users/{id}:
    get:
      tags: [Users]
      summary: Detalle de usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
