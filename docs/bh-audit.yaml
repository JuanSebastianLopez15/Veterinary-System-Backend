openapi: 3.0.3
info:
  title: B&H Veterinary System — bh-audit
  description: |
    Servicio de trazabilidad para B&H.

    Este microservicio tiene un único propósito: **recibir y almacenar el registro
    de todas las acciones relevantes** que ocurren en `bh-core`, y permitir su
    consulta con filtros.

    ## Características
    - No tiene usuarios propios ni maneja sesiones
    - Solo recibe solicitudes de `bh-core` desde dentro del clúster de Kubernetes
    - Tiene su propia base de datos independiente
    - Si este servicio no está disponible, `bh-core` sigue operando con normalidad

    ## Seguridad de red
    Este servicio **no es accesible desde fuera del clúster**. La seguridad se
    garantiza por aislamiento de red en Kubernetes. No implementa autenticación
    propia.
  version: 1.0.0
  contact:
    name: Equipo B&H
  license:
    name: MIT

servers:
  - url: http://bh-audit-service:3001
    description: Servicio interno dentro del clúster Kubernetes

tags:
  - name: System
    description: Endpoints de sistema
  - name: Audit Events
    description: Recepción y consulta de eventos de auditoría

paths:
  /health:
    get:
      tags:
        - System
      operationId: checkHealth
      summary: Health check para Kubernetes
      description: Endpoint utilizado por los probes liveness y readiness de Kubernetes.
      responses:
        '200':
          description: El servicio está funcionando correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /api/v1/audit/events:
    post:
      tags:
        - Audit Events
      operationId: createAuditEvent
      summary: Registrar un evento de auditoría
      description: |
        Recibe un evento de auditoría enviado por `bh-core` y lo almacena de forma
        permanente. Este endpoint es invocado internamente cada vez que ocurre una
        acción relevante en el sistema principal.

        **Solo accesible desde `bh-core` dentro del clúster.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditEventRequest'
            examples:
              registroUsuario:
                summary: Registro de nuevo usuario
                value:
                  action: REGISTRO_USUARIO
                  userId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  userRole: cliente
                  entityType: User
                  entityId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  details:
                    email: "carlos.lopez@email.com"
                    firstName: "Carlos"
                    lastName: "López"
                  ipAddress: "192.168.1.100"
              loginFallido:
                summary: Intento de login fallido
                value:
                  action: LOGIN_FALLIDO
                  userId: null
                  userRole: null
                  entityType: User
                  entityId: null
                  details:
                    email: "usuario@desconocido.com"
                    reason: "Credenciales incorrectas"
                  ipAddress: "203.0.113.45"
      responses:
        '201':
          description: Evento registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventResponse'
        '400':
          description: Datos del evento inválidos o incompletos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Audit Events
      operationId: getAuditEvents
      summary: Consultar eventos de auditoría con filtros
      description: |
        Permite consultar el historial de eventos con filtros opcionales.

        > **CRÍTICO: USO EXCLUSIVO INTERNO**
        > Este endpoint NO DEBE exponerse hacia el exterior (ni siquiera para el rol Administrador).
        > Su único consumidor es `bh-core`, el cual lo invoca internamente cuando el Administrador solicita consultar el historial o generar el PDF.
      parameters:
        - name: action
          in: query
          required: false
          description: Filtrar por tipo de acción
          schema:
            $ref: '#/components/schemas/AuditAction'
        - name: userId
          in: query
          required: false
          description: Filtrar por ID del usuario que ejecutó la acción
          schema:
            type: string
            format: uuid
        - name: userRole
          in: query
          required: false
          description: Filtrar por rol del usuario
          schema:
            type: string
            enum:
              - cliente
              - recepcionista
              - veterinario
              - administrador
        - name: entityType
          in: query
          required: false
          description: Filtrar por tipo de entidad afectada
          schema:
            type: string
            enum:
              - User
              - Appointment
              - MedicalRecord
              - Vaccination
              - Hospitalization
              - Invoice
              - InventoryProduct
              - Service
              - Pet
              - Payment
        - name: startDate
          in: query
          required: false
          description: Inicio del rango de fechas (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2026-05-01T00:00:00-05:00"
        - name: endDate
          in: query
          required: false
          description: Fin del rango de fechas (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2026-05-31T23:59:59-05:00"
        - name: page
          in: query
          required: false
          description: Número de página (inicia en 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Resultados por página
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortOrder
          in: query
          required: false
          description: Dirección del ordenamiento
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: Lista paginada de eventos de auditoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditEventsResponse'
        '400':
          description: Parámetros de consulta inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AuditAction:
      type: string
      description: Tipos de acciones registradas en el sistema de auditoría
      enum:
        - REGISTRO_USUARIO
        - VERIFICACION_CORREO
        - APROBACION_CUENTA
        - RECHAZO_CUENTA
        - LOGIN_EXITOSO
        - LOGIN_FALLIDO
        - CREACION_CITA
        - CAMBIO_ESTADO_CITA
        - CREACION_HISTORIAL_MEDICO
        - EDICION_HISTORIAL_MEDICO
        - REGISTRO_VACUNA
        - INICIO_HOSPITALIZACION
        - ALTA_HOSPITALIZACION
        - CREACION_FACTURA
        - ANULACION_FACTURA
        - AJUSTE_INVENTARIO
        - CREACION_SERVICIO
        - EDICION_SERVICIO
        - DESACTIVACION_SERVICIO
        - PAGO_CITA_REGISTRADO
        - SUSPENSION_USUARIO

    CreateAuditEventRequest:
      type: object
      required:
        - action
        - entityType
        - details
      properties:
        action:
          $ref: '#/components/schemas/AuditAction'
        userId:
          type: string
          format: uuid
          nullable: true
          description: ID del usuario que ejecutó la acción. Null para acciones sin usuario autenticado (ej. login fallido).
        userRole:
          nullable: true
          type: string
          enum:
            - cliente
            - recepcionista
            - veterinario
            - administrador
          description: Rol del usuario al momento de la acción. Null si no hay usuario.
        entityType:
          type: string
          description: Tipo de entidad afectada por la acción
          enum:
            - User
            - Appointment
            - MedicalRecord
            - Vaccination
            - Hospitalization
            - Invoice
            - InventoryProduct
            - Service
            - Pet
            - Payment
        entityId:
          type: string
          format: uuid
          nullable: true
          description: ID de la entidad afectada. Null si no aplica.
        details:
          type: object
          additionalProperties: true
          description: |
            Datos adicionales contextuales sobre la acción.
            **NOTA:** La estructura interna de este objeto varía completamente según el tipo de acción.
            Ejemplos:
            - Para login fallido: `{ "email": "...", "reason": "Credenciales incorrectas" }`
            - Para creación de cita: `{ "petName": "...", "veterinarianName": "...", "scheduledAt": "..." }`
            - Para ajuste de inventario: `{ "productName": "...", "previousStock": 10, "newStock": 25 }`
        ipAddress:
          type: string
          description: Dirección IP desde donde se originó la acción
          example: "192.168.1.100"

    AuditEventResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único del evento
        action:
          $ref: '#/components/schemas/AuditAction'
        userId:
          type: string
          format: uuid
          nullable: true
        userRole:
          nullable: true
          type: string
          enum:
            - cliente
            - recepcionista
            - veterinario
            - administrador
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
          nullable: true
        details:
          type: object
          additionalProperties: true
        ipAddress:
          type: string
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora exacta en que se registró el evento

    PaginatedAuditEventsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditEventResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          description: Total de registros encontrados
          example: 245
        page:
          type: integer
          description: Página actual
          example: 1
        limit:
          type: integer
          description: Registros por página
          example: 20
        totalPages:
          type: integer
          description: Total de páginas disponibles
          example: 13

    ErrorResponse:
      type: object
      required:
        - statusCode
        - error
        - message
        - timestamp
        - path
      properties:
        statusCode:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Validación fallida"
        details:
          type: array
          description: Detalles de validación (solo en errores 400)
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          example: "/api/v1/audit/events"
