apiVersion: apps/v1
kind: Deployment
metadata:
  name: bh-core-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bh-core-db
  template:
    metadata:
      labels:
        app: bh-core-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bh-core-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: DB_NAME
          # Para un entorno local robusto, montamos un volumen persistente
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: bh-core-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bh-core-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
